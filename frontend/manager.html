<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FAMS - Manager Dashboard</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="bg">
    <div class="container">
        <header class="topbar" style="animation: fadeInUp 0.3s ease;">
            <div>
                <h2 style="margin: 0;">Manager Dashboard</h2>
                <p class="muted" style="margin: 0; font-size: 0.85rem;">Manage assets, transactions, and team operations
                </p>
            </div>
            <div style="display: flex; gap: 12px;">
                <button type="button" onclick="window.location.href='profile.html'"
                    style="background: var(--accent); width: auto; padding: 10px 20px;">👤 Profile</button>
                <button onclick="logout()">Logout</button>
            </div>
        </header>

        <!-- Quick Stats -->
        <section class="grid"
            style="animation: fadeInUp 0.4s ease; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));">
            <div class="card" style="text-align: center; padding: 24px;">
                <div style="font-size: 2.5rem; margin-bottom: 8px;">📊</div>
                <h3 style="margin: 0; font-size: 1.1rem;">Total Assets</h3>
                <p id="totalAssets"
                    style="font-size: 2rem; font-weight: 700; margin: 8px 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    0</p>
            </div>
            <div class="card" style="text-align: center; padding: 24px;">
                <div style="font-size: 2.5rem; margin-bottom: 8px;">💼</div>
                <h3 style="margin: 0; font-size: 1.1rem;">Total Value</h3>
                <p id="totalValue"
                    style="font-size: 2rem; font-weight: 700; margin: 8px 0; background: linear-gradient(135deg, #4ade80 0%, #14b8a6 100%); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    ₹0</p>
            </div>
            <div class="card" style="text-align: center; padding: 24px;">
                <div style="font-size: 2.5rem; margin-bottom: 8px;">💰</div>
                <h3 style="margin: 0; font-size: 1.1rem;">Transactions</h3>
                <p id="totalTransactions"
                    style="font-size: 2rem; font-weight: 700; margin: 8px 0; color: var(--text-primary);">0</p>
            </div>
        </section>

        <!-- Asset Management -->
        <section class="grid" style="animation: fadeInUp 0.5s ease;">
            <div class="card">
                <h3>Create New Asset</h3>
                <form id="assetForm">
                    <input placeholder="Asset Code" id="assetCode" required />
                    <input placeholder="Asset Name" id="assetName" required />
                    <select id="assetCategory" required>
                        <option value="">Loading categories...</option>
                    </select>
                    <label>Purchase Date</label>
                    <input type="date" id="purchaseDate" required />
                    <input placeholder="Purchase Value (₹)" id="purchaseValue" type="number" min="0" step="0.01"
                        required />
                    <input placeholder="Current Value (₹)" id="currentValue" type="number" min="0" step="0.01"
                        required />
                    <input placeholder="Owner User ID" id="ownerId" type="number" min="1" required />
                    <button type="submit">💾 Create Asset</button>
                </form>
                <div id="assetMsg" class="muted"></div>
            </div>

            <div class="card">
                <h3>Record Transaction</h3>
                <form id="txForm">
                    <input placeholder="Asset ID" id="txAssetId" type="number" min="1" required />
                    <label>Transaction Type</label>
                    <select id="txType" required>
                        <option>BUY</option>
                        <option>SELL</option>
                        <option>TRANSFER</option>
                        <option>WITHDRAWAL</option>
                    </select>
                    <input placeholder="Quantity" id="txQty" type="number" min="1" value="1" />
                    <input placeholder="Price (₹)" id="txPrice" type="number" min="0" step="0.01" />
                    <input placeholder="From User ID (optional)" id="txFrom" type="number" min="1" />
                    <input placeholder="To User ID (optional)" id="txTo" type="number" min="1" />
                    <textarea placeholder="Transaction notes (optional)" id="txNotes" rows="2"
                        maxlength="500"></textarea>
                    <button type="submit">💳 Record Transaction</button>
                </form>
                <div id="txMsg" class="muted"></div>
            </div>
        </section>

        <!-- Assets Table -->
        <section class="card" style="animation: fadeInUp 0.6s ease;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin: 0;">📦 Asset Portfolio</h3>
                <button type="button" onclick="loadAssets()" style="width: auto; padding: 10px 20px;">🔄
                    Refresh</button>
            </div>
            <div class="table-container">
                <table id="assetTable">
                    <tbody>
                        <tr>
                            <td colspan="6" class="empty-state">
                                <div class="skeleton" style="height: 40px;"></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Transactions Table -->
        <section class="card" style="animation: fadeInUp 0.7s ease;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin: 0;">💸 Recent Transactions</h3>
                <button type="button" onclick="loadTransactions()" style="width: auto; padding: 10px 20px;">🔄
                    Refresh</button>
            </div>
            <div class="table-container">
                <table id="txTable">
                    <tbody>
                        <tr>
                            <td colspan="6" class="empty-state">
                                <div class="skeleton" style="height: 40px;"></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Team Members -->
        <section class="card" style="animation: fadeInUp 0.8s ease;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin: 0;">👥 Team Members</h3>
                <button type="button" onclick="loadUsers()" style="width: auto; padding: 10px 20px;">🔄 Refresh</button>
            </div>
            <div class="table-container">
                <table id="userTable">
                    <tbody>
                        <tr>
                            <td colspan="4" class="empty-state">
                                <div class="skeleton" style="height: 40px;"></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Reports Section -->
        <section class="card" style="animation: fadeInUp 0.9s ease;">
            <h3>📊 Financial Reports</h3>
            <div class="row" style="flex-wrap: wrap;">
                <button onclick="loadReports()" style="width: auto;">📈 Load Reports</button>
                <button type="button" onclick="downloadReportPdf('asset-utilization')" style="width: auto;">📄 Asset
                    Utilization PDF</button>
                <button type="button" onclick="downloadReportPdf('profit-loss')" style="width: auto;">📄 Profit & Loss
                    PDF</button>
                <button type="button" onclick="downloadReportPdf('balance-sheet')" style="width: auto;">📄 Balance Sheet
                    PDF</button>
            </div>
            <pre id="reportBox"
                style="max-height: 400px; overflow-y: auto; margin-top: 20px; background: rgba(15, 23, 42, 0.6); padding: 20px; border-radius: 12px;"></pre>
        </section>
    </div>
    <script src="js/depreciation.js"></script>
    <script src="js/receipt.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/manager.js"></script>
</body>

</html>
