<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FAMS - Investor Dashboard</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="bg">
    <div class="container">
        <header class="topbar" style="animation: fadeInUp 0.3s ease;">
            <div>
                <h2 style="margin: 0;">Investor Dashboard</h2>
                <p class="muted" style="margin: 0; font-size: 0.85rem;">Track your portfolio performance</p>
            </div>
            <div style="display: flex; gap: 12px;">
                <button type="button" onclick="window.location.href='profile.html'"
                    style="background: var(--accent); width: auto; padding: 10px 20px;">👤 Profile</button>
                <button onclick="logout()">Logout</button>
            </div>
        </header>

        <section class="card" style="animation: fadeInUp 0.4s ease;">
            <h3>Portfolio Summary</h3>
            <div id="portfolioBox">
                <!-- Loading skeleton -->
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                    <div class="skeleton" style="height: 120px; border-radius: 12px;"></div>
                    <div class="skeleton" style="height: 120px; border-radius: 12px;"></div>
                    <div class="skeleton" style="height: 120px; border-radius: 12px;"></div>
                    <div class="skeleton" style="height: 120px; border-radius: 12px;"></div>
                </div>
            </div>
        </section>

        <!-- Advanced Risk Analysis -->
        <section class="card" style="animation: fadeInUp 0.45s ease;">
            <h3>📊 Advanced Portfolio Analytics</h3>
            <div id="riskAnalysis">
                <div class="skeleton" style="height: 150px;"></div>
            </div>
        </section>

        <section class="card" style="animation: fadeInUp 0.5s ease;">
            <h3>Your Assets</h3>
            <div class="table-container">
                <table id="investorAssets">
                    <tbody>
                        <tr>
                            <td colspan="8" class="empty-state">
                                <div class="skeleton" style="height: 40px;"></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
    <script src="js/app.js"></script>
    <script src="js/investor.js"></script>
</body>

</html>
